pipeline:
  build-and-push:
    image: woodpeckerci/plugin-docker-buildx
    settings:
      repo: ghcr.io/mindulle/sonagi-eagle-gallery
      registry: ghcr.io
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:7}
      username:
        from_secret: ghcr_username
      password:
        from_secret: ghcr_password
    when:
      event: [push]
      branch: [main]
