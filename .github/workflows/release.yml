name: Release & Publish

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value=${{ needs.release.outputs.new_release_version }},enable=${{ needs.release.outputs.new_release_published == 'true' }}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  update-k8s:
    needs: [release, docker]
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update K8s manifests with new version
        env:
          NEW_VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          sed -i "s|image: ghcr.io/mindulle/sonagi-eagle-gallery:.*|image: ghcr.io/mindulle/sonagi-eagle-gallery:${NEW_VERSION}|g" k8s/deployment.yaml
          sed -i "s|image: ghcr.io/mindulle/sonagi-eagle-gallery:.*|image: ghcr.io/mindulle/sonagi-eagle-gallery:${NEW_VERSION}|g" k8s/cronjob.yaml

      - name: Create Pull Request for K8s deployment
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update K8s manifests to deploy v${{ needs.release.outputs.new_release_version }}"
          title: "🚀 Deploy v${{ needs.release.outputs.new_release_version }} to Kubernetes"
          body: |
            A new Docker image for **v${{ needs.release.outputs.new_release_version }}** has been built and pushed to the registry.

            Merging this pull request will update the Kubernetes manifests (`deployment.yaml` and `cronjob.yaml`) so that ArgoCD can automatically sync and deploy the new version.
          branch: "deploy/v${{ needs.release.outputs.new_release_version }}"
          labels: "automated-pr, deployment"
